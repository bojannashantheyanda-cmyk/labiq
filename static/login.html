<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LabIQ — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f4f8; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .container { width: 100%; max-width: 420px; padding: 20px; }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo h1 { font-size: 36px; color: #1a73e8; font-weight: 700; }
    .logo p { color: #666; font-size: 14px; margin-top: 4px; }
    .card { background: white; border-radius: 16px; padding: 32px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .tabs { display: flex; margin-bottom: 28px; border-bottom: 2px solid #f0f0f0; }
    .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; font-size: 14px; font-weight: 500; color: #888; border-bottom: 3px solid transparent; margin-bottom: -2px; }
    .tab.active { color: #1a73e8; border-bottom-color: #1a73e8; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; transition: border-color 0.2s; }
    .form-group input:focus { outline: none; border-color: #1a73e8; }
    .btn { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px; }
    .btn:hover { background: #1558b0; }
    .error { background: #fce8e6; color: #c5221f; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-top: 14px; display: none; }
    .success { background: #e6f4ea; color: #2d8f47; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-top: 14px; display: none; }
    .form-panel { display: none; }
    .form-panel.active { display: block; }
  </style>
</head>
<body>
<div class="container">
  <div class="logo">
    <h1>⚗️ LabIQ</h1>
    <p>Lab Analytics Platform</p>
  </div>
  <div class="card">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">Sign In</div>
      <div class="tab" onclick="switchTab('register')">Create Account</div>
    </div>

    <!-- LOGIN FORM -->
    <div class="form-panel active" id="panel-login">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="loginUsername" placeholder="Enter your username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Enter your password" onkeypress="if(event.key==='Enter') doLogin()">
      </div>
      <button class="btn" onclick="doLogin()">Sign In</button>
      <div class="error" id="loginError"></div>
    </div>

    <!-- REGISTER FORM -->
    <div class="form-panel" id="panel-register">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="regUsername" placeholder="Choose a username">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="Enter your email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="regPassword" placeholder="Choose a password" onkeypress="if(event.key==='Enter') doRegister()">
      </div>
      <button class="btn" onclick="doRegister()">Create Account</button>
      <div class="error" id="registerError"></div>
      <div class="success" id="registerSuccess"></div>
    </div>
  </div>
</div>

<script>
  // If already logged in, redirect to main app
  if (localStorage.getItem('labiq_token')) {
    window.location.href = '/';
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
    document.querySelector(`.tab:${tab === 'login' ? 'first-child' : 'last-child'}`).classList.add('active');
    document.getElementById(`panel-${tab}`).classList.add('active');
  }

  async function doLogin() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;
    const errorBox = document.getElementById('loginError');

    if (!username || !password) {
      errorBox.textContent = 'Please fill in all fields';
      errorBox.style.display = 'block';
      return;
    }

    try {
      const res = await fetch('http://127.0.0.1:8000/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('labiq_token', data.access_token);
        localStorage.setItem('labiq_username', data.username);
        window.location.href = '/';
      } else {
        errorBox.textContent = data.detail || 'Login failed';
        errorBox.style.display = 'block';
      }
    } catch(e) {
      errorBox.textContent = 'Could not connect to server';
      errorBox.style.display = 'block';
    }
  }

  async function doRegister() {
    const username = document.getElementById('regUsername').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const errorBox = document.getElementById('registerError');
    const successBox = document.getElementById('registerSuccess');

    if (!username || !email || !password) {
      errorBox.textContent = 'Please fill in all fields';
      errorBox.style.display = 'block';
      return;
    }
    if (password.length < 6) {
      errorBox.textContent = 'Password must be at least 6 characters';
      errorBox.style.display = 'block';
      return;
    }

    try {
      const res = await fetch('http://127.0.0.1:8000/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password })
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('labiq_token', data.access_token);
        localStorage.setItem('labiq_username', data.username);
        successBox.textContent = `Account created! Welcome, ${data.username}! Redirecting...`;
        successBox.style.display = 'block';
        errorBox.style.display = 'none';
        setTimeout(() => window.location.href = '/', 1500);
      } else {
        errorBox.textContent = data.detail || 'Registration failed';
        errorBox.style.display = 'block';
      }
    } catch(e) {
      errorBox.textContent = 'Could not connect to server';
      errorBox.style.display = 'block';
    }
  }
</script>
</body>
</html>
